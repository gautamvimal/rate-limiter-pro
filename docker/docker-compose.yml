version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: rate-limiter-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rate-limiter-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/rate_limiter
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
      UNIX_SOCKET_PATH: /tmp/rate-limiter-cache.sock
      SLA_ADJUST_INTERVAL_MS: 300000
      DEFAULT_WINDOW_MS: 60000
      DEFAULT_LIMIT: 60
      DEFAULT_BURST_MULTIPLIER: 1.3
      DEFAULT_QUEUE_LIMIT: 20
      BASE_JITTER_MS: 30
      MAX_JITTER_MS: 180
    depends_on:
      - mongo
      - redis

  client:
    image: node:20-alpine
    container_name: rate-limiter-client
    working_dir: /app/client
    command: sh -c "npm install && npm run dev"
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ../client:/app/client
    depends_on:
      - server

volumes:
  mongo_data:
